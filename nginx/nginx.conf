worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types application/json application/x-protobuf text/plain text/css application/javascript;

    # ============================================================
    # Upstream definitions
    # ============================================================
    upstream geoserver {
        server geoserver:8080;
        keepalive 16;
    }

    upstream martin {
        server martin:3000;
        keepalive 32;
    }

    upstream pgadmin {
        server pgadmin:80;
    }

    # ============================================================
    # Main server block
    # ============================================================
    server {
        listen 80;
        server_name _;

        # Health check endpoint for the proxy itself
        location /health {
            access_log off;
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }

        # --------------------------------------------------------
        # GeoServer — /geoserver/*
        # OGC WMS, WFS, WCS, WMTS
        # --------------------------------------------------------
        location /geoserver {
            proxy_pass         http://geoserver;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # GeoServer needs this for internal URL generation
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;

            # Allow large WCS/upload requests
            client_max_body_size 512M;
            proxy_read_timeout   300s;
            proxy_send_timeout   300s;
        }

        # --------------------------------------------------------
        # Martin — /tiles/*
        # Vector MVT tiles direct from PostGIS
        # --------------------------------------------------------
        location /tiles/ {
            proxy_pass         http://martin/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # Tiles are immutable — aggressive caching
            add_header Cache-Control "public, max-age=3600, s-maxage=86400";
            add_header X-Tile-Source "martin";

            # CORS for browser map clients
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        }

        # --------------------------------------------------------
        # pgAdmin — /pgadmin/*
        # --------------------------------------------------------
        location /pgadmin/ {
            proxy_pass         http://pgadmin/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Script-Name /pgadmin;
            proxy_redirect     off;
        }

        # --------------------------------------------------------
        # Default — redirect to GeoServer welcome
        # --------------------------------------------------------
        location / {
            return 302 /geoserver/web/;
        }
    }
}
